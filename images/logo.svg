<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="boilerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="60%" stop-color="#0284c7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" fill="url(#sky)" rx="12"/>

  <!-- Sun -->
  <circle cx="60" cy="55" r="22" fill="#fbbf24" filter="url(#glow)" opacity="0.95"/>
  <!-- Sun rays -->
  <g stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" opacity="0.8">
    <line x1="60" y1="22" x2="60" y2="15"/>
    <line x1="60" y1="88" x2="60" y2="95"/>
    <line x1="27" y1="55" x2="20" y2="55"/>
    <line x1="93" y1="55" x2="100" y2="55"/>
    <line x1="36" y1="31" x2="31" y2="26"/>
    <line x1="84" y1="79" x2="89" y2="84"/>
    <line x1="84" y1="31" x2="89" y2="26"/>
    <line x1="36" y1="79" x2="31" y2="84"/>
  </g>

  <!-- Solar panel array -->
  <g transform="translate(115, 30)">
    <!-- Panel frame -->
    <rect x="0" y="0" width="90" height="55" rx="4" fill="#1e40af" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- Panel grid -->
    <line x1="30" y1="0" x2="30" y2="55" stroke="#60a5fa" stroke-width="0.8" opacity="0.6"/>
    <line x1="60" y1="0" x2="60" y2="55" stroke="#60a5fa" stroke-width="0.8" opacity="0.6"/>
    <line x1="0" y1="18" x2="90" y2="18" stroke="#60a5fa" stroke-width="0.8" opacity="0.6"/>
    <line x1="0" y1="37" x2="90" y2="37" stroke="#60a5fa" stroke-width="0.8" opacity="0.6"/>
    <!-- Panel shine -->
    <rect x="2" y="2" width="25" height="14" rx="2" fill="#3b82f6" opacity="0.4"/>
    <rect x="32" y="2" width="25" height="14" rx="2" fill="#3b82f6" opacity="0.4"/>
    <rect x="62" y="2" width="25" height="14" rx="2" fill="#3b82f6" opacity="0.4"/>
    <rect x="2" y="20" width="25" height="14" rx="2" fill="#3b82f6" opacity="0.3"/>
    <rect x="32" y="20" width="25" height="14" rx="2" fill="#3b82f6" opacity="0.3"/>
    <rect x="62" y="20" width="25" height="14" rx="2" fill="#3b82f6" opacity="0.3"/>
    <!-- Stand -->
    <line x1="45" y1="55" x2="45" y2="70" stroke="#64748b" stroke-width="3"/>
    <line x1="30" y1="70" x2="60" y2="70" stroke="#64748b" stroke-width="3"/>
  </g>

  <!-- Lightning bolt / energy flow -->
  <g transform="translate(230, 55)" filter="url(#glow)">
    <polygon points="14,0 6,18 13,18 0,38 18,14 10,14" fill="#facc15" opacity="0.95"/>
  </g>

  <!-- Boiler body -->
  <g transform="translate(270, 25)">
    <!-- Tank -->
    <rect x="0" y="15" width="50" height="80" rx="10" fill="url(#boilerGrad)" stroke="#ea580c" stroke-width="1.5"/>
    <!-- Water level indicator -->
    <rect x="3" y="55" width="44" height="37" rx="8" fill="url(#waterGrad)" opacity="0.7"/>
    <!-- Heating element glow -->
    <ellipse cx="25" cy="85" rx="16" ry="5" fill="#fbbf24" opacity="0.5" filter="url(#glow)"/>
    <!-- Temperature lines on body -->
    <line x1="10" y1="35" x2="40" y2="35" stroke="#fed7aa" stroke-width="1" opacity="0.5"/>
    <line x1="10" y1="45" x2="40" y2="45" stroke="#fed7aa" stroke-width="1" opacity="0.4"/>
    <!-- Pipe top -->
    <rect x="20" y="5" width="10" height="12" rx="3" fill="#94a3b8"/>
    <rect x="15" y="0" width="20" height="8" rx="3" fill="#64748b"/>
    <!-- Pipe bottom -->
    <rect x="20" y="95" width="10" height="12" rx="3" fill="#94a3b8"/>
    <!-- Valve -->
    <circle cx="25" cy="15" r="5" fill="#475569" stroke="#64748b" stroke-width="1"/>
    <circle cx="25" cy="15" r="2" fill="#94a3b8"/>
  </g>

  <!-- Second boiler (smaller, background) -->
  <g transform="translate(332, 40)" opacity="0.65">
    <rect x="0" y="12" width="38" height="62" rx="8" fill="#c2410c" stroke="#9a3412" stroke-width="1"/>
    <rect x="2" y="42" width="34" height="29" rx="6" fill="url(#waterGrad)" opacity="0.6"/>
    <rect x="14" y="4" width="10" height="10" rx="2" fill="#64748b"/>
  </g>

  <!-- Connection wire from panels to boilers -->
  <path d="M 205 57 Q 248 40 268 65" stroke="#facc15" stroke-width="2" fill="none" stroke-dasharray="5,3" opacity="0.7"/>

  <!-- Text -->
  <text x="200" y="155" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#f1f5f9" letter-spacing="0.5">Boiler Solar Controller</text>
  <text x="200" y="175" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#94a3b8" letter-spacing="1">Home Assistant Custom Integration</text>

  <!-- HA logo hint — small dot badge -->
  <circle cx="356" cy="168" r="14" fill="#18a0fb" opacity="0.15"/>
  <text x="356" y="173" text-anchor="middle" font-family="Arial" font-size="14" fill="#38bdf8" opacity="0.8">HA</text>
</svg>
